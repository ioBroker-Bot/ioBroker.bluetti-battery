<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#065f46"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <!-- battery terminal nub -->
  <rect x="396" y="220" width="34" height="72" rx="12" ry="12" fill="#ffffff"/>

  <!-- battery body -->
  <rect x="86" y="152" width="312" height="208" rx="40" ry="40"
        fill="none" stroke="#ffffff" stroke-width="24"/>

  <!-- "B" inside the battery -->
  <text x="242" y="256" text-anchor="middle" dominant-baseline="central"
        font-family="Arial, Helvetica, sans-serif" font-weight="700"
        font-size="170" fill="#ffffff">B</text>
</svg>
